<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hispania Docs — Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ocean:#0B4F6C;--ocean-mid:#1A6E8E;--ocean-light:#E8F4F8;
  --surface:#F7FAFB;--white:#FFFFFF;--ink:#0D1B22;--muted:#6B8898;
  --border:#D4E5ED;--green:#1A9E6E;--green-bg:#E6F7F2;
  --amber:#D97706;--amber-bg:#FEF3C7;--red:#DC2626;
  --shadow:0 1px 3px rgba(11,79,108,0.08),0 4px 16px rgba(11,79,108,0.06);
  --shadow-lg:0 8px 32px rgba(11,79,108,0.14);
}
body{font-family:'Inter',sans-serif;background:var(--surface);min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--ocean);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:white;display:flex;align-items:center;gap:10px;}
.topbar-sub{font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px;}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);padding:6px 12px;border-radius:20px;font-size:12px;color:rgba(255,255,255,0.8);}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.container{max-width:960px;margin:0 auto;padding:24px 20px;}

/* ADD SECTION */
.add-card{background:white;border-radius:14px;padding:20px;margin-bottom:24px;box-shadow:var(--shadow);}
.add-card h3{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--ocean);margin-bottom:14px;text-transform:uppercase;letter-spacing:0.06em;}
.field-row{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:12px;font-weight:500;color:var(--muted);}
.field input{padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--ocean);}
.btn-primary{padding:10px 22px;background:var(--ocean);color:white;border:none;border-radius:9px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;height:42px;white-space:nowrap;transition:background 0.2s;}
.btn-primary:hover{background:var(--ocean-mid);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:white;border-radius:12px;padding:16px;text-align:center;box-shadow:var(--shadow);}
.stat-num{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;color:var(--ocean);line-height:1;margin-bottom:4px;}
.stat-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.05em;}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--ink);}

/* LEGEND */
.legend{display:flex;align-items:center;gap:12px;padding:8px 14px;background:white;border-radius:8px;margin-bottom:12px;font-size:11px;color:var(--muted);box-shadow:var(--shadow);}
.legend strong{color:var(--ocean);}

/* PERSON ROW */
.person-list{display:flex;flex-direction:column;gap:8px;}
.person-row{
  background:white;
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:14px 18px;
  display:grid;
  grid-template-columns:32px 1fr auto auto auto;
  gap:14px;
  align-items:center;
  box-shadow:var(--shadow);
  transition:box-shadow 0.2s,border-color 0.2s;
}
.person-row:hover{box-shadow:var(--shadow-lg);border-color:#a8c8d8;}
.person-num{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--muted);text-align:center;}
.person-info .name{font-weight:600;font-size:14px;color:var(--ink);}
.person-info .phone{font-size:12px;color:var(--muted);margin-top:2px;}
.person-info .pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}

.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge-ok{background:var(--green-bg);color:var(--green);}
.badge-pending{background:var(--amber-bg);color:var(--amber);}
.badge-blue{background:#EEF2FF;color:#4B6CB7;}

/* TOGGLES */
.toggle-group{display:flex;flex-direction:column;gap:6px;}
.toggle-row{display:flex;align-items:center;gap:8px;}
.toggle-lbl{font-size:11px;color:var(--muted);font-weight:500;width:66px;}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#CBD5E1;border-radius:20px;transition:0.2s;}
.toggle-slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.2s;}
.toggle input:checked+.toggle-slider{background:var(--ocean);}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px);}

/* WA BUTTON */
.btn-wa{padding:9px 14px;background:#25D366;color:white;border:none;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background 0.2s;}
.btn-wa:hover{background:#1ebe5c;}
.wa-icon{width:15px;height:15px;fill:white;flex-shrink:0;}

/* RESUMEN BTN */
.btn-resumen{padding:9px 16px;background:white;border:1.5px solid var(--border);border-radius:9px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--ocean);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.btn-resumen:hover{background:var(--ocean-light);}

/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px;border:2px dashed var(--border);border-radius:12px;background:white;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink);color:white;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;transition:transform 0.3s;z-index:100;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:600px){
  .field-row{grid-template-columns:1fr;}.stats-row{grid-template-columns:repeat(3,1fr);}
  .person-row{grid-template-columns:28px 1fr auto auto;}
  .toggle-group{display:none;}
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">🤿 Hispania Docs</div>
    <div class="topbar-sub">Panel de administración</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="resumen.html" class="btn-resumen">📄 Ver resumen</a>
    <div class="live-badge"><span class="live-dot"></span> Tiempo real</div>
  </div>
</div>

<div class="container">

  <!-- ADD -->
  <div class="add-card">
    <h3>➕ Añadir persona</h3>
    <div class="field-row">
      <div class="field">
        <label>Nombre completo</label>
        <input type="text" id="input-name" placeholder="María García López" autocomplete="off">
      </div>
      <div class="field">
        <label>Teléfono (con prefijo país)</label>
        <input type="text" id="input-phone" placeholder="+34 600 000 000" autocomplete="off">
      </div>
      <button class="btn-primary" onclick="addPerson()" id="btn-add">Añadir</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--green)" id="stat-complete">—</div>
      <div class="stat-label">Completados</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--amber)" id="stat-pending">—</div>
      <div class="stat-label">Pendientes</div>
    </div>
  </div>

  <!-- LIST -->
  <div class="section-header">
    <div class="section-title">Participantes</div>
  </div>
  <div class="legend">
    <span>Deslizadores por persona:</span>
    <strong>Tit = Titulación de buceo</strong>
    <strong>Seg = Seguro de buceo</strong>
  </div>
  <div class="person-list" id="person-list">
    <div class="empty">Cargando...</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAO8VpDW_FH98KzDjWVQifAhkka8eT1298",
  authDomain: "hipaniadocs.firebaseapp.com",
  databaseURL: "https://hipaniadocs-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hipaniadocs",
  storageBucket: "hipaniadocs.firebasestorage.app",
  messagingSenderId: "960546133872",
  appId: "1:960546133872:web:83221679b511d1c5ba21b5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const peopleRef = ref(db, 'personas');

// BASE URL del formulario — cambia cuando subas a GitHub Pages
const FORM_BASE_URL = window.location.origin + '/form.html';

// Escuchar cambios en tiempo real
onValue(peopleRef, (snapshot) => {
  const data = snapshot.val();
  renderList(data);
  updateStats(data);
});

// Añadir persona
window.addPerson = function() {
  const name = document.getElementById('input-name').value.trim();
  const phone = document.getElementById('input-phone').value.trim();
  if (!name || !phone) { showToast('⚠️ Rellena nombre y teléfono'); return; }
  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  push(peopleRef, {
    nombre: name,
    telefono: phone,
    pedirTitulacion: false,
    pedirSeguro: false,
    completado: false,
    fechaCreacion: Date.now()
  }).then(() => {
    document.getElementById('input-name').value = '';
    document.getElementById('input-phone').value = '';
    btn.disabled = false;
    showToast('✅ Añadido · Activa los deslizadores y envía el link');
  }).catch(() => { btn.disabled = false; showToast('❌ Error al guardar'); });
};

// Toggle titulación / seguro
window.toggleDoc = function(id, field, val) {
  const updates = {};
  updates[field] = val;
  update(ref(db, 'personas/' + id), updates);
  showToast(val ? '✅ Se pedirá ese documento' : '🚫 No se pedirá ese documento');
};

// Abrir WhatsApp
window.openWA = function(phone, firstName, personId) {
  const clean = phone.replace(/\s+/g, '');
  const link = FORM_BASE_URL + '?id=' + personId;
  const msg = encodeURIComponent(`Hola ${firstName}, necesito que rellenes este formulario con tu documentación para el buceo en la Reserva de Cabo Tiñoso:\n\n${link}`);
  window.open(`https://wa.me/${clean}?text=${msg}`, '_blank');
};

function renderList(data) {
  const list = document.getElementById('person-list');
  if (!data) {
    list.innerHTML = '<div class="empty">Añade personas arriba para empezar</div>';
    return;
  }
  const entries = Object.entries(data).sort((a, b) => (a[1].fechaCreacion || 0) - (b[1].fechaCreacion || 0));
  let html = '';
  entries.forEach(([id, p], i) => {
    const firstName = p.nombre ? p.nombre.split(' ')[0] : '';
    let pills = `<span class="badge ${p.completado ? 'badge-ok' : 'badge-pending'}" style="font-size:10px;">DNI</span>`;
    if (p.pedirTitulacion) pills += `<span class="badge ${p.titulacionOk ? 'badge-ok' : 'badge-pending'}" style="font-size:10px;">Tit</span>`;
    if (p.pedirSeguro) pills += `<span class="badge ${p.seguroOk ? 'badge-ok' : 'badge-pending'}" style="font-size:10px;">Seg</span>`;
    if (p.numAcompanantes > 0) pills += `<span class="badge badge-blue" style="font-size:10px;">+${p.numAcompanantes} acomp.</span>`;

    html += `
    <div class="person-row">
      <div class="person-num">${i + 1}</div>
      <div class="person-info">
        <div class="name">${p.nombre || '—'}</div>
        <div class="phone">${p.telefono || '—'}</div>
        <div class="pills">${pills}</div>
      </div>
      <div class="toggle-group">
        <div class="toggle-row">
          <span class="toggle-lbl">Titulación</span>
          <label class="toggle">
            <input type="checkbox" ${p.pedirTitulacion ? 'checked' : ''} onchange="toggleDoc('${id}','pedirTitulacion',this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <span class="toggle-lbl">Seguro</span>
          <label class="toggle">
            <input type="checkbox" ${p.pedirSeguro ? 'checked' : ''} onchange="toggleDoc('${id}','pedirSeguro',this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div>${p.completado
        ? '<span class="badge badge-ok">✅ Listo</span>'
        : '<span class="badge badge-pending">⏳ Pendiente</span>'}</div>
      <button class="btn-wa" onclick="openWA('${p.telefono}','${firstName}','${id}')">
        <svg class="wa-icon" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Enviar link
      </button>
    </div>`;
  });
  list.innerHTML = html;
}

function updateStats(data) {
  if (!data) {
    document.getElementById('stat-total').textContent = '0';
    document.getElementById('stat-complete').textContent = '0';
    document.getElementById('stat-pending').textContent = '0';
    return;
  }
  const entries = Object.values(data);
  const total = entries.length;
  const complete = entries.filter(p => p.completado).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-complete').textContent = complete;
  document.getElementById('stat-pending').textContent = total - complete;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Enter para añadir
document.getElementById('input-phone').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.addPerson();
});
</script>
</body>
</html>
